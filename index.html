<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ITLOK</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
      font-family: Arial, sans-serif;
    }

    .text {
      font-size: 4em;
      font-weight: bold;
      text-align: center;

      /* Rainbow gradient text */
      background: linear-gradient(
        90deg,
        red, orange, yellow, green, cyan, blue, violet
      );
      background-size: 400%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      /* Animations */
      animation: rainbowMove 5s linear infinite, blink 1.2s infinite;
    }

    @keyframes rainbowMove {
      0% { background-position: 0%; }
      100% { background-position: 400%; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>

<body>
  <div class="text">DIMO GETS NO NEED IPAGYABANG' DIMO TULAD OFW PINAGYABANG PATAWA 🤣🤣🤣</div>
</body>
</html>
